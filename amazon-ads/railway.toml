# Railway deployment config for the amazon-ads MCP service.
# Set this service's root directory to "amazon-ads/" in the Railway dashboard.
# All env vars are injected via Railway → Service → Variables (not committed here).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand is intentionally omitted so Railway uses the Dockerfile CMD (shell form),
# which properly expands $PORT via sh at container startup.
# The SSE endpoint is at /sse; use it for health checks if Railway requires a path.
# healthcheckPath = "/sse"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
