services:
  amazon-ads-mcp:
    image: openbridge/amazon-ads-mcp:latest
    container_name: amazon-ads-mcp
    # Reads secrets from .env at repo root — run from repo root:
    #   docker compose -f amazon-ads/docker-compose.yml up
    env_file:
      - ../.env
    environment:
      # Runtime (env_file sets TRANSPORT=sse, HOST, PORT, LOG_LEVEL)
      - HOST=0.0.0.0
      - PORT=9080
      - LOG_LEVEL=INFO
      # Auth
      - AUTH_METHOD=direct
      # Token persistence
      - AMAZON_ADS_TOKEN_PERSIST=true
      - AMAZON_ADS_CACHE_DIR=/app/.cache/amazon-ads-mcp
    ports:
      - "9080:9080"
    volumes:
      - downloads:/app/data
      - cache:/app/.cache
    command:
      - python
      - -m
      - amazon_ads_mcp.server
      - --transport
      - "${TRANSPORT:-http}"
      - --host
      - "0.0.0.0"
      - --port
      - "9080"

volumes:
  downloads: {}
  cache: {}
